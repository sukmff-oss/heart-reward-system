<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="pink">
<title>❤️ ERIC 專屬禮物</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
 display: flex; flex-direction: column; align-items: center; justify-content: center;
 background: #1a1a2e;
 min-height: 100vh; font-family: "Microsoft JhengHei", Arial, sans-serif;
 cursor: pointer; user-select: none; -webkit-user-select: none;
}
body::before {
 content: "";
 position: fixed; inset: 0;
 background: radial-gradient(ellipse at center, #16213e 0%, #0f0f23 100%);
 z-index: -1;
}
.container {
 display: flex; flex-direction: column; align-items: center; gap: 20px;
 animation: fadeIn 0.5s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

.heart-btn {
 width: 120px; height: 120px;
 background: linear-gradient(180deg, #ffd700 0%, #ff8c00 50%, #e07000 100%);
 border-radius: 50%;
 display: flex; align-items: center; justify-content: center;
 box-shadow: 0 8px 0 #8B5a00, 0 12px 30px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.3);
 cursor: pointer; transition: transform 0.2s;
 animation: bounce 2s ease-in-out infinite;
 position: relative;
 border: 3px solid #1a1a1a;
}
@keyframes bounce {
 0%,100% { transform: scale(1); }
 50% { transform: scale(1.08); }
}
.heart-btn:active { transform: scale(0.95) translateY(4px); animation-play-state: paused; box-shadow: 0 4px 0 #8B5a00; }

.heart-btn svg { width: 70px; height: 70px; }

.label {
 color: #ffd700; font-size: 18px; font-weight: 900;
 text-shadow: 0 2px 8px rgba(0,0,0,0.5);
 letter-spacing: 1px;
}
.hint {
 color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 8px;
 text-align: center; font-weight: 600;
}

/* iOS Add to Home Screen instruction */
.ios-hint {
 display: none; color: rgba(255,255,255,0.8); font-size: 10px;
 text-align: center; margin-top: 16px; line-height: 1.6;
}
@media screen and (max-width: 480px) {
 .ios-hint { display: block; }
}

/* Android instruction */
.android-btn {
 display: none; color: rgba(255,255,255,0.8); font-size: 10px;
 text-align: center; margin-top: 16px; line-height: 1.6;
}
</style>
</head>
<body>
<div class="container">
 <div class="heart-btn" onclick="openApp()">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
   <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
     <stop offset="0%" style="stop-color:#fff"/>
     <stop offset="100%" style="stop-color:#fff"/>
    </linearGradient>
   </defs>
   <path d="M50 88 C20 60, 0 40, 0 25 C0 10, 12 0, 25 0 C35 0, 43 6, 50 15 C57 6, 65 0, 75 0 C88 0, 100 10, 100 25 C100 40, 80 60, 50 88Z" fill="#fff"/>
   <ellipse cx="30" cy="22" rx="10" ry="8" fill="rgba(255,107,157,0.3)"/>
  </svg>
 </div>
 <div class="label">❤️ ERIC 專屬禮物</div>
 <div class="hint">點愛心開啟</div>
 <div class="ios-hint">iOS: 點分享按鈕 → 加到主畫面</div>
 <div class="android-btn">Android: 點瀏覽器選單 → 加入主畫面</div>
</div>

<script>
function openApp() {
 window.location.href = 'https://sukmff-oss.github.io/heart-reward-system/';
}
</script>
</body>
</html>
