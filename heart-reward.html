<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 心心獎勵系統</title>
<style>
:root {
 --primary: #c0392b;
 --secondary: #e74c3c;
 --accent: #ff6b6b;
 --bg: #fff5f5;
 --text: #2d2d2d;
 --muted: #888;
 --border: #ffcccc;
 --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
 background: linear-gradient(135deg, #fff0f0 0%, #ffe8e8 50%, #ffd5d5 100%);
 min-height: 100vh;
 color: var(--text);
}

header {
 background: linear-gradient(135deg, #c0392b, #e74c3c);
 color: #fff;
 padding: 20px 24px;
 text-align: center;
 box-shadow: 0 4px 20px rgba(192,57,43,0.3);
 position: sticky;
 top: 0;
 z-index: 100;
}
header h1 { font-size: 28px; font-weight: 900; letter-spacing: 2px; }
header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

.container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

/* 心心餘額卡 */
.heart-display {
 background: linear-gradient(135deg, #c0392b, #ff6b6b);
 border-radius: var(--radius);
 padding: 40px 20px;
 text-align: center;
 color: #fff;
 box-shadow: 0 8px 32px rgba(192,57,43,0.35);
 margin-bottom: 20px;
 position: relative;
 overflow: hidden;
}
.heart-display::before {
 content: '';
 position: absolute;
 top: -50%;
 left: -50%;
 width: 200%;
 height: 200%;
 background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
 pointer-events: none;
}
.heart-display .big-heart {
 font-size: 72px;
 display: block;
 line-height: 1;
 animation: pulse 2s infinite;
}
@keyframes pulse {
 0%, 100% { transform: scale(1); }
 50% { transform: scale(1.08); }
}
.heart-display .count {
 font-size: 80px;
 font-weight: 900;
 line-height: 1.1;
 text-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.heart-display .label {
 font-size: 18px;
 opacity: 0.9;
 margin-top: 6px;
}
.heart-display .money {
 font-size: 16px;
 opacity: 0.75;
 margin-top: 4px;
}

/* 動作區 */
.action-row {
 display: flex;
 gap: 12px;
 margin-bottom: 24px;
}
.action-btn {
 flex: 1;
 padding: 18px 12px;
 border-radius: var(--radius);
 font-size: 18px;
 font-weight: 800;
 border: none;
 cursor: pointer;
 text-align: center;
 transition: 0.2s;
 box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }
.action-btn.add {
 background: linear-gradient(135deg, #27ae60, #2ecc71);
 color: #fff;
}
.action-btn.use {
 background: linear-gradient(135deg, #c0392b, #e74c3c);
 color: #fff;
}
.action-btn.apply {
 background: linear-gradient(135deg, #8e44ad, #9b59b6);
 color: #fff;
}

/* 卡片 */
.card {
 background: #fff;
 border-radius: var(--radius);
 padding: 20px;
 box-shadow: 0 4px 20px rgba(0,0,0,0.08);
 border: 1px solid var(--border);
 margin-bottom: 16px;
}
.card h3 {
 font-size: 18px;
 font-weight: 800;
 color: var(--primary);
 margin-bottom: 14px;
 display: flex;
 align-items: center;
 gap: 8px;
}

/* 申請列表 */
.apply-item {
 display: flex;
 align-items: center;
 gap: 12px;
 padding: 14px;
 border-radius: 12px;
 background: #fff5f5;
 border: 1px solid var(--border);
 margin-bottom: 10px;
}
.apply-item .info { flex: 1; }
.apply-item .info .reason { font-size: 16px; font-weight: 700; color: var(--text); }
.apply-item .info .meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
.apply-item .btns { display: flex; gap: 8px; }
.apply-item .btn-approve, .apply-item .btn-reject {
 padding: 8px 16px;
 border-radius: 8px;
 font-size: 14px;
 font-weight: 700;
 border: none;
 cursor: pointer;
 color: #fff;
}
.apply-item .btn-approve { background: #27ae60; }
.apply-item .btn-reject { background: #95a5a6; }

/* 歷史 */
.history-item {
 display: flex;
 align-items: center;
 gap: 12px;
 padding: 12px 0;
 border-bottom: 1px solid #f5e0e0;
}
.history-item:last-child { border-bottom: none; }
.history-item .icon { font-size: 28px; }
.history-item .icon.in { color: #27ae60; }
.history-item .icon.out { color: #e74c3c; }
.history-item .info { flex: 1; }
.history-item .info .reason { font-size: 15px; font-weight: 700; }
.history-item .info .date { font-size: 12px; color: var(--muted); }
.history-item .delta { font-size: 18px; font-weight: 800; }
.history-item .delta.plus { color: #27ae60; }
.history-item .delta.minus { color: #e74c3c; }

/* 表單彈窗 */
.modal-overlay {
 position: fixed;
 inset: 0;
 background: rgba(0,0,0,0.5);
 backdrop-filter: blur(4px);
 display: none;
 align-items: center;
 justify-content: center;
 z-index: 1000;
 padding: 16px;
}
.modal-overlay.active { display: flex; }
.modal {
 background: #fff;
 border-radius: var(--radius);
 padding: 28px 24px;
 width: 100%;
 max-width: 420px;
 box-shadow: 0 16px 48px rgba(0,0,0,0.2);
}
.modal h3 { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 20px; text-align: center; }
.modal input, .modal textarea {
 width: 100%;
 padding: 14px 16px;
 border: 2px solid var(--border);
 border-radius: 10px;
 font-size: 16px;
 font-family: inherit;
 font-weight: 700;
 outline: none;
 margin-bottom: 12px;
 transition: 0.2s;
 box-sizing: border-box;
}
.modal input:focus, .modal textarea:focus {
 border-color: var(--secondary);
 background: #fff5f5;
}
.modal textarea { resize: vertical; min-height: 80px; }
.modal .btn-row { display: flex; gap: 10px; margin-top: 6px; }
.modal .btn-confirm {
 flex: 1;
 padding: 14px;
 border-radius: 10px;
 font-size: 16px;
 font-weight: 800;
 border: none;
 color: #fff;
 cursor: pointer;
}
.modal .btn-confirm.green { background: linear-gradient(135deg, #27ae60, #2ecc71); }
.modal .btn-confirm.red { background: linear-gradient(135deg, #c0392b, #e74c3c); }
.modal .btn-cancel {
 flex: 1;
 padding: 14px;
 border-radius: 10px;
 font-size: 16px;
 font-weight: 800;
 border: 1px solid var(--border);
 background: #fff;
 color: var(--muted);
 cursor: pointer;
}

/* 登入 */
.login-screen {
 position: fixed;
 inset: 0;
 background: linear-gradient(135deg, #c0392b, #ff6b6b);
 display: flex;
 align-items: center;
 justify-content: center;
 z-index: 2000;
 padding: 20px;
}
.login-box {
 background: #fff;
 border-radius: 20px;
 padding: 36px 28px;
 width: 100%;
 max-width: 360px;
 box-shadow: 0 16px 48px rgba(0,0,0,0.25);
 text-align: center;
}
.login-box h2 { font-size: 26px; color: var(--primary); margin-bottom: 8px; }
.login-box p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
.login-box input {
 width: 100%;
 padding: 16px;
 border: 2px solid var(--border);
 border-radius: 12px;
 font-size: 20px;
 font-weight: 700;
 text-align: center;
 letter-spacing: 4px;
 outline: none;
 margin-bottom: 16px;
 box-sizing: border-box;
}
.login-box input:focus { border-color: var(--secondary); }
.login-box button {
 width: 100%;
 padding: 16px;
 background: linear-gradient(135deg, #c0392b, #e74c3c);
 color: #fff;
 border: none;
 border-radius: 12px;
 font-size: 18px;
 font-weight: 800;
 cursor: pointer;
}
.login-box .error { color: #e74c3c; font-size: 13px; margin-top: 8px; font-weight: 700; display: none; }

/* 空狀態 */
.empty-state {
 text-align: center;
 padding: 28px 16px;
 color: var(--muted);
 font-size: 15px;
}

/* 通知小點 */
.badge {
 background: #e74c3c;
 color: #fff;
 width: 20px;
 height: 20px;
 border-radius: 50%;
 font-size: 11px;
 font-weight: 700;
 display: inline-flex;
 align-items: center;
 justify-content: center;
 vertical-align: middle;
 margin-left: 6px;
}

/* Tab式切換 */
.tab-bar {
 display: flex;
 gap: 4px;
 background: #fff;
 padding: 6px;
 border-radius: var(--radius);
 box-shadow: 0 4px 16px rgba(0,0,0,0.08);
 margin-bottom: 16px;
}
.tab-btn {
 flex: 1;
 padding: 12px 8px;
 border-radius: 10px;
 font-size: 14px;
 font-weight: 800;
 border: none;
 background: transparent;
 cursor: pointer;
 color: var(--muted);
 transition: 0.2s;
 text-align: center;
}
.tab-btn.active {
 background: var(--primary);
 color: #fff;
}
.page-section { display: none; }
.page-section.active { display: block; }
</style>
</head>
<body>

<!-- 登入畫面 -->
<div class="login-screen" id="loginScreen">
 <div class="login-box">
  <h2>🏆 心心獎勵系統</h2>
  <p>請輸入管理密碼</p>
  <input type="password" id="pwdInput" placeholder="密碼" maxlength="20">
  <button onclick="doLogin()">登入</button>
  <div class="error" id="loginError">密碼錯誤，請重新輸入</div>
 </div>
</div>

<!-- 主體 -->
<div style="display:none" id="mainApp">
<header>
 <h1>🏆 心心獎勵系統</h1>
 <p>每顆心 = $100</p>
</header>

<div class="container">
 <!-- 心心餘額 -->
 <div class="heart-display">
  <span class="big-heart">❤️</span>
  <div class="count" id="heartCount">0</div>
  <div class="label">顆心</div>
  <div class="money">= $ <span id="moneyValue">0</span></div>
 </div>

 <!-- 動作按鈕 -->
 <div class="action-row">
  <button class="action-btn add" onclick="openModal('add')">➕ 發放愛心</button>
  <button class="action-btn apply" onclick="openModal('request')">📝 申請扣心</button>
 </div>

 <!-- 分頁切換 -->
 <div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('pending')">待審核<span class="badge" id="pendingBadge" style="display:none">0</span></button>
  <button class="tab-btn" onclick="showTab('history')">歷史紀錄</button>
 </div>

 <!-- 待審核 -->
 <div class="page-section active" id="page-pending">
  <div class="card">
   <h3>📋 待審核申請</h3>
   <div id="pendingList"></div>
  </div>
 </div>

 <!-- 歷史 -->
 <div class="page-section" id="page-history">
  <div class="card">
   <h3>📜 所有記錄</h3>
   <div id="historyList"></div>
  </div>
 </div>
</div>
</div>

<!-- 發放彈窗 -->
<div class="modal-overlay" id="modal-add">
 <div class="modal">
  <h3>➕ 發放愛心</h3>
  <input type="number" id="addQty" placeholder="愛心數量" min="1" value="1">
  <input type="text" id="addReason" placeholder="原因（例：考試100分）">
  <div class="btn-row">
   <button class="btn-confirm green" onclick="doAdd()">確認發放</button>
   <button class="btn-cancel" onclick="closeModal('add')">取消</button>
  </div>
 </div>
</div>

<!-- 申請扣心彈窗 -->
<div class="modal-overlay" id="modal-request">
 <div class="modal">
  <h3>📝 申請扣心</h3>
  <input type="number" id="reqQty" placeholder="愛心數量" min="1" value="1">
  <textarea id="reqReason" placeholder="想买什么？（用途说明）"></textarea>
  <div class="btn-row">
   <button class="btn-confirm red" onclick="doRequest()">送出申請</button>
   <button class="btn-cancel" onclick="closeModal('request')">取消</button>
  </div>
 </div>
</div>

<script>
var PASSWORD = '1234'; // 管理密碼
var DATA_KEY = 'heart_rewards_v1';

function getData() {
 try {
 var x = localStorage.getItem(DATA_KEY);
 if (x) return JSON.parse(x);
 } catch(e) {}
 return { hearts: 0, history: [], requests: [] };
}
function saveData(d) {
 localStorage.setItem(DATA_KEY, JSON.stringify(d));
}
function updateDisplay() {
 var d = getData();
 document.getElementById('heartCount').textContent = d.hearts;
 document.getElementById('moneyValue').textContent = d.hearts * 100;
 renderPending();
 renderHistory();
}
function renderPending() {
 var d = getData();
 var el = document.getElementById('pendingList');
 var badge = document.getElementById('pendingBadge');
 if (d.requests.length === 0) {
 el.innerHTML = '<div class="empty-state">目前沒有待審核的申請</div>';
 badge.style.display = 'none';
 } else {
 badge.style.display = 'inline-flex';
 badge.textContent = d.requests.length;
 el.innerHTML = d.requests.map(function(r) {
 return '<div class="apply-item">' +
 '<span style="font-size:28px;">💸</span>' +
 '<div class="info">' +
 '<div class="reason">'+r.qty+'顆心 — '+r.reason+'</div>' +
 '<div class="meta">申請時間：'+r.time+'</div>' +
 '</div>' +
 '<div class="btns">' +
 '<button class="btn-approve" onclick="approveRequest('+r.id+')">核准</button>' +
 '<button class="btn-reject" onclick="rejectRequest('+r.id+')">拒絕</button>' +
 '</div>' +
 '</div>';
 }).join('');
 }
}
function renderHistory() {
 var d = getData();
 var el = document.getElementById('historyList');
 if (d.history.length === 0) {
 el.innerHTML = '<div class="empty-state">還沒有任何記錄</div>';
 return;
 }
 el.innerHTML = d.history.map(function(h) {
 var icon = h.type === 'in' ? '🎁' : '🛒';
 var cls = h.type === 'in' ? 'in' : 'out';
 var delta = h.type === 'in' ? '+'+h.qty : '-'+h.qty;
 var dcls = h.type === 'in' ? 'plus' : 'minus';
 return '<div class="history-item">' +
 '<span class="icon '+cls+'">'+icon+'</span>' +
 '<div class="info">' +
 '<div class="reason">'+h.reason+'</div>' +
 '<div class="date">'+h.date+'</div>' +
 '</div>' +
 '<span class="delta '+dcls+'">'+delta+'</span>' +
 '</div>';
 }).join('');
}
function showTab(tab) {
 document.querySelectorAll('.page-section').forEach(function(s){ s.classList.remove('active') });
 document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active') });
 document.getElementById('page-'+tab).classList.add('active');
 event.target.classList.add('active');
}
function openModal(type) {
 document.getElementById('modal-'+type).classList.add('active');
 if (type === 'add') {
 document.getElementById('addQty').value = '1';
 document.getElementById('addReason').value = '';
 document.getElementById('addReason').focus();
 } else {
 document.getElementById('reqQty').value = '1';
 document.getElementById('reqReason').value = '';
 document.getElementById('reqReason').focus();
 }
}
function closeModal(type) {
 document.getElementById('modal-'+type).classList.remove('active');
}
function doLogin() {
 var pw = document.getElementById('pwdInput').value;
 if (pw === PASSWORD) {
 document.getElementById('loginScreen').style.display = 'none';
 document.getElementById('mainApp').style.display = 'block';
 updateDisplay();
 } else {
 document.getElementById('loginError').style.display = 'block';
 document.getElementById('pwdInput').value = '';
 document.getElementById('pwdInput').focus();
 }
}
function doAdd() {
 var qty = parseInt(document.getElementById('addQty').value);
 var reason = document.getElementById('addReason').value.trim() || '獎勵';
 if (!qty || qty <= 0) { alert('請輸入正確數量'); return; }
 var d = getData();
 d.hearts += qty;
 d.history.unshift({
 id: Date.now(),
 type: 'in',
 qty: qty,
 reason: reason,
 date: new Date().toLocaleString('zh-Hant-TW')
 });
 saveData(d);
 updateDisplay();
 closeModal('add');
}
function doRequest() {
 var qty = parseInt(document.getElementById('reqQty').value);
 var reason = document.getElementById('reqReason').value.trim() || '消費';
 if (!qty || qty <= 0) { alert('請輸入正確數量'); return; }
 var d = getData();
 d.requests.push({
 id: Date.now(),
 qty: qty,
 reason: reason,
 time: new Date().toLocaleString('zh-Hant-TW')
 });
 saveData(d);
 updateDisplay();
 closeModal('request');
 alert('📝 申請已送出，等待審核！');
}
function approveRequest(id) {
 if (!confirm('確認核准這筆申請？')) return;
 var d = getData();
 var req = null;
 var idx = -1;
 for (var i = 0; i < d.requests.length; i++) {
 if (d.requests[i].id == id) { req = d.requests[i]; idx = i; break; }
 }
 if (!req) return;
 d.hearts -= req.qty;
 d.history.unshift({
 id: Date.now(),
 type: 'out',
 qty: req.qty,
 reason: '【核准】' + req.reason,
 date: new Date().toLocaleString('zh-Hant-TW')
 });
 d.requests.splice(idx, 1);
 saveData(d);
 updateDisplay();
}
function rejectRequest(id) {
 if (!confirm('確認拒絕這筆申請？')) return;
 var d = getData();
 for (var i = 0; i < d.requests.length; i++) {
 if (d.requests[i].id == id) { d.requests.splice(i, 1); break; }
 }
 saveData(d);
 updateDisplay();
}
</script>
</body>
</html>
