<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國研化工 | 出入庫管理系統（雲端版）</title>
<style>
:root {
 --primary: #1a3c2a;
 --secondary: #2d6a4f;
 --accent: #f7c400;
 --bg: #e8f5e9;
 --white: #fafffe;
 --text: #1a2e1a;
 --muted: #5a7a5a;
 --border: #b8d4ba;
 --green: #27ae60;
 --red: #c0392b;
 --radius: 14px;
 --shadow: 0 10px 30px rgba(26,60,42,0.10);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
 background: var(--bg);
 color: var(--text);
 line-height: 1.6;
 min-width: 1100px;
}
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

header {
 background: var(--primary);
 color: #fff;
 padding: 0 40px;
 height: 72px;
 display: flex;
 align-items: center;
 justify-content: space-between;
 position: sticky;
 top: 0;
 z-index: 100;
 box-shadow: 0 4px 20px rgba(26,60,42,0.20);
}
header h1 { font-size: 32px; font-weight: 800; letter-spacing: 1px; }
.header-info { font-size: 14px; color: rgba(255,255,255,0.75); }
.header-badge {
  background: #27ae60;
  color: #fff;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
}

.container { max-width: 1300px; margin: 0 auto; padding: 32px 40px; }

.nav-tabs {
 display: flex;
 gap: 8px;
 margin-bottom: 28px;
 background: var(--white);
 padding: 10px;
 border-radius: var(--radius);
 box-shadow: var(--shadow);
}
.tab-btn {
 flex: 1;
 text-align: center;
 padding: 18px 20px;
 border-radius: 14px 14px 0 0;
 font-size: 20px;
 font-weight: 800;
 cursor: pointer;
 border: none;
 background: rgba(39,174,96,0.5) !important;
 backdrop-filter: blur(12px);
 -webkit-backdrop-filter: blur(12px);
 color: #fff;
 transition: .25s;
 border: 1px solid rgba(39,174,96,0.3);
 border-bottom: none;
 margin-right: 4px;
}
.tab-btn:hover {
 background: rgba(39,174,96,0.7) !important;
}
.tab-btn.active {
 background: rgba(192,57,43,0.8) !important;
 border-color: rgba(192,57,43,0.5);
 border-bottom: none;
 box-shadow: 0 4px 16px rgba(192,57,43,0.3);
}
.tab-btn:last-child { margin-right: 0; }
.nav-tabs { border-bottom: none; gap: 0; padding: 0; border-radius: 14px 14px 0 0; overflow: hidden; }


.card {
 background: var(--white);
 border: 1px solid var(--border);
 border-radius: var(--radius);
 box-shadow: var(--shadow);

}
.card h2 { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 20px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 18px; font-weight: 800; color: var(--text); }
.form-group input, .form-group select {
 border: 1px solid var(--border);
 border-radius: 10px;
 padding: 12px 14px;
 font-size: 18px;
 font-weight: 700;
 font-family: inherit;
 background: #fafcff;
 outline: none;
 transition: .2s;
}
.form-group input:focus, .form-group select:focus {
 border-color: var(--secondary);
 background: #fff;
 box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
}

.btn {
 display: inline-flex;
 align-items: center;
 justify-content: center;
 padding: 12px 28px;
 border-radius: 999px;
 font-size: 18px;
 font-weight: 800;
 cursor: pointer;
 border: none;
 transition: .2s;
 min-width: 120px;
}
.btn-primary { background: rgba(192,57,43,0.75) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(192,57,43,0.5); color: #fff; box-shadow: 0 4px 16px rgba(192,57,43,0.3); }
.btn-success { background: rgba(39,174,96,0.7) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(39,174,96,0.45); color: #fff; box-shadow: 0 4px 16px rgba(39,174,96,0.25); }
.btn-danger { background: rgba(192,57,43,0.75) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(192,57,43,0.5); color: #fff; box-shadow: 0 4px 16px rgba(192,57,43,0.3); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(26,60,42,0.20); }
.btn-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

table { width: 100%; border-collapse: collapse; font-size: 17px; font-weight: 700; }
th {
 background: var(--primary);
 color: #fff;
 padding: 14px 16px;
 text-align: left;
 font-weight: 600;
}
th:first-child { border-radius: 10px 0 0 0; }
th:last-child { border-radius: 0 10px 0 0; }
td {
 padding: 13px 16px;
 border-bottom: 1px solid var(--border);
 color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: #f8fafd; }
tr:hover td { background: #eef5ff; }
.action-btn { padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; color: #fff; }
.action-btn.out { background: var(--red); }
.action-btn.del { background: #888; }

.stat-grid {
 display: grid;
 grid-template-columns: repeat(4, 1fr);
 gap: 18px;
 margin-bottom: 28px;
}
.stat-card {
 background: var(--white);
 border: 1px solid var(--border);
 border-radius: var(--radius);
 padding: 24px 20px;
 text-align: center;
 box-shadow: var(--shadow);
}
.stat-card h3 { font-size: 52px; font-weight: 800; color: var(--secondary); margin-bottom: 6px; }
.stat-card p { color: var(--muted); font-size: 18px; font-weight: 700; }

.search-bar {
 display: flex;
 gap: 12px;
 margin-bottom: 20px;
 flex-wrap: wrap;
}
.search-bar input, .search-bar select {
 border: 1px solid var(--border);
 border-radius: 999px;
 padding: 12px 18px;
 font-size: 18px;
 font-weight: 700;
 font-family: inherit;
 outline: none;
 background: var(--white);
}
.search-bar input:focus { border-color: var(--secondary); }

.page-section { display: none; }
.page-section.active { display: block; }

.footer {
 text-align: center;
 padding: 24px;
 color: var(--muted);
 font-size: 13px;
 border-top: 1px solid var(--border);
 margin-top: 32px;
}

.tag-in { background: var(--green); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; }
.tag-out { background: var(--red); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; }

.danger-zone {
 margin-top: 24px;
 padding: 20px;
 background: #fff3f3;
 border: 2px solid #e74c3c;
 border-radius: 14px;
}
.danger-zone h3 { color: #e74c3c; font-size: 16px; margin-bottom: 12px; }
.danger-zone-inner { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.danger-zone input[type="password"], .danger-zone input[type="text"] {
 border: 1px solid #e74c3c;
 border-radius: 10px;
 padding: 10px 14px;
 font-size: 18px;
 font-weight: 700;
 font-family: inherit;
 outline: none;
}
.danger-zone input[type="text"] { flex: 1; min-width: 200px; }
.danger-zone input[type="password"] { width: 200px; }
.danger-zone p { font-size: 12px; color: #e74c3c; margin-top: 8px; }

/* Cloud loading bar */
#cloudLoading {
 position: fixed;
 top: 0;
 left: 0;
 right: 0;
 background: linear-gradient(90deg, #2d6a4f, #27ae60);
 color: #fff;
 text-align: center;
 padding: 8px 16px;
 font-size: 14px;
 font-weight: bold;
 z-index: 99999;
 letter-spacing: 0.5px;
}

/* PRINT AREA */
#printArea { display: none; }
#printArea table { width: 100%; border-collapse: collapse; }
#printArea th { background: var(--primary); color: #fff; padding: 12px 14px; text-align: left; font-weight: 600; }
#printArea td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }

/* PRINT STYLES */
@media print {
 header, .nav-tabs, .btn-row, footer, .search-bar, .action-btn, .btn,
 #page-stock, #page-in, #page-out,
 .danger-zone, #historyTable, .no-print { display: none !important; }
 body { background: #fff; min-width: 0; }
 .container { max-width: 100%; padding: 0; margin: 0; }
 .card { box-shadow: none; border: 1px solid #333; padding: 16px; page-break-inside: avoid; }
 #printArea { display: block !important; }
 #page-history .card { border: none; padding: 0; }
 @page { size: A4 landscape; margin: 15mm; }
}

/* ===== GLASSMORPHISM CREAM ===== */
body { background: linear-gradient(135deg, #f5e6c8 0%, #efe0b8 30%, #e8d4a0 60%, #ddd0a8 100%) fixed; }
.header { background: rgba(60,40,20,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.15); }
.header-badge { background: rgba(180,140,60,0.5) !important; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
.container { background: transparent; padding-top: 24px; }
.nav-tabs { background: rgba(60,40,20,0.2); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(180,140,60,0.2); }
.tab-btn { background: rgba(60,40,20,0.15); border: 1px solid rgba(180,140,60,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
.tab-btn.active { background: rgba(180,140,60,0.55); border-color: rgba(180,140,60,0.5); }
.tab-btn:hover { background: rgba(60,40,20,0.3) !important; }
.card { background: rgba(60,40,20,0.18); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(180,140,60,0.18); box-shadow: 0 8px 32px rgba(60,40,20,0.15), inset 0 1px 0 rgba(255,255,255,0.15); }
.stat-card { background: rgba(60,40,20,0.15); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(180,140,60,0.15); box-shadow: 0 8px 32px rgba(60,40,20,0.12), inset 0 1px 0 rgba(255,255,255,0.1); }
.form-group input, .form-group select { background: rgba(255,255,255,0.25); border: 1px solid rgba(180,140,60,0.25); color: #3d2810; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
.form-group input::placeholder { color: rgba(61,40,16,0.4); }
.form-group input:focus, .form-group select:focus { background: rgba(255,255,255,0.4); border-color: rgba(180,140,60,0.5); }
.search-bar input, .search-bar select { background: rgba(255,255,255,0.25); border: 1px solid rgba(180,140,60,0.2); color: #3d2810; }
.btn-outline { background: rgba(255,255,255,0.2); border: 1px solid rgba(180,140,60,0.3); color: #3d2810; }
.btn-outline:hover { background: rgba(180,140,60,0.18); }
.btn-primary { background: rgba(180,140,60,0.7) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(180,140,60,0.4); color: #fff; }
.btn-primary:hover { background: rgba(180,140,60,0.9) !important; }
.btn-success { background: rgba(100,160,80,0.65) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(100,160,80,0.35); color: #fff; }
.btn-success:hover { background: rgba(100,160,80,0.85) !important; }
.btn-danger { background: rgba(192,57,43,0.7) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(192,57,43,0.35); color: #fff; }
.btn-danger:hover { background: rgba(192,57,43,0.9) !important; }
table th { background: rgba(60,40,20,0.55) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
td { background: rgba(255,255,255,0.1); color: #3d2810; }
tr:hover td { background: rgba(180,140,60,0.12); }
tr:nth-child(even) td { background: rgba(255,255,255,0.06); }
tr:last-child td { border-bottom: none; }
.footer { border-top: 1px solid rgba(180,140,60,0.15); color: rgba(61,40,16,0.55); }
.danger-zone { background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.35); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
.danger-zone input[type=password], .danger-zone input[type=text] { background: rgba(255,255,255,0.25); border-color: rgba(192,57,43,0.5); color: #3d2810; }
#printArea table { background: rgba(255,255,255,0.1); }
#printArea th { background: rgba(60,40,20,0.55) !important; }
@media print {
 body { background: #fff !important; }
 .card, .stat-card { background: #fff; backdrop-filter: none; border: 1px solid #ccc; }
 td { background: #fff; color: #000; }
}
</style>
</head>
<body>

<header>
 <h1>📦 國研化工 | 出入庫管理系統</h1>
 <div class="header-info">
 <span class="header-badge">☁️ 雲端同步</span>
 </div>
</header>

<div class="container">
 <div class="stat-grid" id="statGrid"></div>

 <div class="nav-tabs">
 <button class="tab-btn" id="tab-history" onclick="showTab('history')">📋 列印紀錄</button>
<button class="tab-btn active" id="tab-stock" onclick="showTab('stock')">📦 庫存查詢</button>
<button class="tab-btn" id="tab-in" onclick="showTab('in')">📥 入庫作業</button>
<button class="tab-btn" id="tab-out" onclick="showTab('out')">📤 出庫作業</button>
</div>

 <!-- 庫存查詢 -->
 <div class="page-section active" id="page-stock">
 <div class="card">
 <h2>📦 庫存查詢</h2>
 <div class="search-bar">
 <input type="text" id="searchStock" placeholder="搜尋品名或顏色..." oninput="renderStock()">
 <select id="searchType" onchange="renderStock()">
 <option value="">全部類型</option>
 <option value="成品">成品</option>
 <option value="原料">原料</option>
 <option value="其他">其他</option>
 </select>
 </div>
 <div style="overflow-x:auto;">
 <table>
 <thead>
 <tr>
 <th>品名</th><th>顏色</th><th>類型</th><th>單位</th>
 <th>目前庫存</th><th>安全存量</th><th>狀態</th><th>操作</th>
 </tr>
 </thead>
 <tbody id="stockTable"></tbody>
 </table>
 </div>
 </div>
 </div>

 <!-- 入庫作業 -->
 <div class="page-section" id="page-in">
 <div class="card">
 <h2>📥 入庫作業</h2>
 <form id="inForm" onsubmit="doIn(event)">
 <div class="form-grid">
 <div class="form-group">
 <label>品名 *</label>
 <select id="inName" required onchange="fillInColor()">
 <option value="">請選擇品名</option>
 <option value="WP-175">WP-175 (WHITE)</option>
 <option value="WP-270">WP-270 (YELLOW)</option>
 <option value="WP-273">WP-273 (YELLOW)</option>
 <option value="WP-275">WP-275 (CLEAR)</option>
 <option value="WP-373">WP-373 (RED)</option>
 <option value="WP-374">WP-374 (RED)</option>
 <option value="WP-378">WP-378 (RED)</option>
 <option value="WP-472">WP-472 (BROWN)</option>
 <option value="WP-572">WP-572 (GREEN)</option>
 <option value="WP-575">WP-575 (CREAM)</option>
 <option value="WP-673">WP-673 (BLUE)</option>
 <option value="WP-675">WP-675 (CREAM)</option>
 <option value="WP-770">WP-770 (VIOLET)</option>
 <option value="WP-773">WP-773 (VIOLET-R)</option>
 <option value="WP-874">WP-874 (ORANGE)</option>
 <option value="WP-973">WP-973 (BLACK)</option>
 </select>
 </div>
 <div class="form-group">
 <label>入庫數量 *</label>
 <input type="number" id="inQty" placeholder="0" min="1" required>
 </div>
 <div class="form-group">
 <label>單位</label>
 <select id="inUnit">
 <option>KG</option><option>桶</option><option>升</option><option>包</option><option>噸</option>
 </select>
 </div>
 <div class="form-group">
 <label>顏色</label>
 <input type="text" id="inModel" placeholder="例：White 白">
 </div>
 <div class="form-group">
 <label>批號 / 備註</label>
 <input type="text" id="inBatch" placeholder="批號或備註（選填）">
 </div>
 <div class="form-group">
 <label>入庫日期 *</label>
 <input type="date" id="inDate" required>
 </div>
 </div>
 <div class="btn-row">
 <button type="submit" class="btn btn-success">✅ 確認入庫</button>
 <button type="reset" class="btn btn-outline">🔄 清除</button>
 </div>
 </form>
 </div>
 </div>

 <!-- 出庫作業 -->
 <div class="page-section" id="page-out">
 <div class="card">
 <h2>📤 出庫作業</h2>
 <form id="outForm" onsubmit="doOut(event)">
 <div class="form-grid">
 <div class="form-group">
 <label>品名 *</label>
 <select id="outName" required onchange="fillOutColor()">
 <option value="">請選擇品名</option>
 <option value="WP-175">WP-175 (WHITE)</option>
 <option value="WP-270">WP-270 (YELLOW)</option>
 <option value="WP-273">WP-273 (YELLOW)</option>
 <option value="WP-275">WP-275 (CLEAR)</option>
 <option value="WP-373">WP-373 (RED)</option>
 <option value="WP-374">WP-374 (RED)</option>
 <option value="WP-378">WP-378 (RED)</option>
 <option value="WP-472">WP-472 (BROWN)</option>
 <option value="WP-572">WP-572 (GREEN)</option>
 <option value="WP-575">WP-575 (CREAM)</option>
 <option value="WP-673">WP-673 (BLUE)</option>
 <option value="WP-675">WP-675 (CREAM)</option>
 <option value="WP-770">WP-770 (VIOLET)</option>
 <option value="WP-773">WP-773 (VIOLET-R)</option>
 <option value="WP-874">WP-874 (ORANGE)</option>
 <option value="WP-973">WP-973 (BLACK)</option>
 </select>
 </div>
 <div class="form-group">
 <label>出庫數量 *</label>
 <input type="number" id="outQty" placeholder="0" min="1" required>
 </div>
 <div class="form-group">
 <label>單位</label>
 <select id="outUnit">
 <option>KG</option><option>桶</option><option>升</option><option>包</option><option>噸</option>
 </select>
 </div>
 <div class="form-group">
 <label>備註 / 用途</label>
 <input type="text" id="outCustomer" placeholder="備註名稱或用途">
 </div>
 <div class="form-group">
 <label>備註</label>
 <input type="text" id="outRemark" placeholder="選填">
 </div>
 <div class="form-group">
 <label>出庫日期 *</label>
 <input type="date" id="outDate" required>
 </div>
 </div>
 <div class="btn-row">
 <button type="submit" class="btn btn-primary">✅ 確認出庫</button>
 <button type="reset" class="btn btn-outline">🔄 清除</button>
 </div>
 </form>
 </div>
 </div>

 <!-- 列印紀錄 -->
 <div class="page-section" id="page-history">
 <div class="card">
 <h2>📋 列印紀錄</h2>
 <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
 <button onclick="printLatestRecord()" class="btn btn-primary" style="background:var(--green);">🖨️ 列印紀錄</button>
 <input type="text" id="searchHistory" placeholder="搜尋品名或備註..." oninput="renderHistory()" style="flex:1;border:1px solid var(--border);border-radius:999px;padding:12px 18px;font-size:15px;font-family:inherit;outline:none;background:var(--white);">
 <select id="filterType" onchange="renderHistory()">
 <option value="">全部</option>
 <option value="in">入庫</option>
 <option value="out">出庫</option>
 </select>
 <input type="password" id="clearPwd" placeholder="清空密碼" style="border:1px solid #e74c3c;border-radius:10px;padding:10px 14px;font-size:15px;outline:none;width:160px;">
 <button type="button" class="btn btn-danger" onclick="clearHistory()">🗑 清空記錄</button>
 <input type="password" id="deletePwd" placeholder="刪除密碼" style="border:1px solid #888;border-radius:10px;padding:10px 14px;font-size:15px;outline:none;width:160px;">
 </div>

 <!-- 列印專用區 -->
 <div id="printArea">
 <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">國研化工實業股份有限公司｜出入庫作業單｜列印日期：<span id="printDate"></span></p>
 <table>
 <thead>
 <tr>
 <th>日期</th><th>品名</th><th>數量</th><th>顏色</th><th>備註</th><th>作業</th>
 </tr>
 </thead>
 <tbody id="printTableBody"></tbody>
 </table>
 </div>

 <div style="overflow-x:auto;">
 <table>
 <thead>
 <tr>
 <th>日期</th><th>品名</th><th>數量</th><th>顏色</th><th>備註</th><th>作業</th><th>操作</th><th>還原</th>
 </tr>
 </thead>
 <tbody id="historyTable"></tbody>
 </table>
 </div>

 <div class="danger-zone">
 <h3>危險區域 - 刪除產品</h3>
 <div class="danger-zone-inner">
 <input type="password" id="adminPwd" placeholder="輸入密碼">
 <input type="text" id="deleteTarget" placeholder="輸入要刪除的品名">
 <button class="btn btn-danger" onclick="adminDelete()">管理員專用</button>
 </div>
 <p>請輸入管理員密碼，並填入正確品名才能刪除產品</p>
 </div>
 </div>
 </div>
</div>

ats(),renderStock(),renderHistory()}function renderStats(){for(var t=getData(),e=t.products.length,a=0;a<t.products.length;a++)t.products[a].stock<=t.products[a].safety&&0;var n=0;for(var pi=0;pi<t.products.length;pi++){var prod=t.products[pi];var s=0;for(var hi=0;hi<t.history.length;hi++){var h=t.history[hi];if(h.deleted)continue;if(h.name===prod.name){s+=h.type==="in"?h.qty:-h.qty}}n+=s>0?s:0}var o=0,r=0;for(a=0;a<t.history.length;a++)t.history[a].date===today&&("in"===t.history[a].type?o+=t.history[a].qty:r+=t.history[a].qty);document.getElementById("statGrid").innerHTML='<div class="stat-card"><h3>'+e+'</h3><p>產品項目</p></div><div class="stat-card"><h3>'+n.toLocaleString()+'</h3><p>總庫存 (KG)</p></div><div class="stat-card"><h3 style="color:var(--green)">'+o+'</h3><p>今日入庫</p></div><div class="stat-card"><h3 style="color:'+(r>0?"var(--red)":"var(--green)")+'">'+r+"</h3><p>今日出庫</p></div>"}function renderStock(){for(var t=getData(),e=document.getElementById("searchStock").value.toLowerCase(),a=document.getElementById("searchType").value,n=[],o=0;o<t.products.length;o++){var r=JSON.parse(JSON.stringify(t.products[o]));r.stock=0;for(var hi=0;hi<t.history.length;hi++){var h=t.history[hi];if(h.deleted)continue;if(h.name===r.name){"in"===h.type?r.stock+=h.qty:r.stock-=h.qty}}d=!e||r.name.toLowerCase().indexOf(e)>-1||r.model.toLowerCase().indexOf(e)>-1,s=!a||r.type===a;if(d&&s){var i=r.stock<=r.safety;n.push("<tr><td><strong>"+r.name+"</strong></td><td>"+r.model+"</td><td>"+r.type+"</td><td>"+r.unit+"</td><td><strong>"+r.stock.toLocaleString()+"</strong></td><td>"+r.safety+"</td><td>"+(i?'<span class="tag-out">低於存量</span>':'<span class="tag-in">正常</span>')+'</td><td><button class="action-btn out" onclick="quickOut(\''+r.name.replace(/'/g,"\\'")+"')\">出庫</button></td></tr>")}}document.getElementById("stockTable").innerHTML=n.length?n.join(""):'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:30px;">尚無資料</td></tr>'}function renderHistory(){

\n數量："+a+" "+n+"\n剩餘庫存："+i.stock+" "+n),confirm("已出庫 "+a+" "+n+"，剩餘庫存 "+i.stock+" "+n+"。\n\n立即查看新庫存？")&&showTab("stock")}else alert("查無此品名，請先至入庫作業新增")}}function quickOut(t){document.getElementById("outName").value=t,showTab("out")}async function delHistory(t){if("123"===document.getElementById("deletePwd").value.trim()){if(confirm("確定刪除此筆記錄？（庫存不回溯，仍可還原）")){var e=getData(),n=0;for(;n<e.history.length;n++)if(e.history[n].id==t){e.history[n].deleted=!0;break}showLoading(!0);try{await api("saveData",{data:JSON.stringify({products:e.products})}),await api("deleteHistory",{id:t})}catch(t){console.error(t)}showLoading(!1),saveData(e),renderAll()}}else alert("密碼錯誤！")}function clearHistory(){if("123"===document.getElementById("clearPwd").value.trim()){if(confirm("確定清空所有列印紀錄？（產品資料會保留）")){var t=getData();t.history=[],showLoading(!0),api("clearHistory").then(function(){}).catch(function(t){console.error(t)}),showLoading(!1),document.getElementById("clearPwd").value="",saveData(t),renderAll(),alert("已清空所有列印紀錄")}}else alert("密碼錯誤！")}function adminDelete(){var t=document.getElementById("adminPwd").value.trim(),e=document.getElementById("deleteTarget").value.trim();if("ADMIN"===t)if(e){for(var a=getData(),n=-1,o=0;o<a.products.length;o++)if(a.products[o].name===e){n=o;break}-1!==n?confirm("確定要刪除品名「"+e+"」？")&&(a.products.splice(n,1),showLoading(!0),api("saveData",{data:JSON.stringify({products:a.products})}).then(function(){showLoading(!1)}).catch(function(t){showLoading(!1),console.error(t)}),document.getElementById("adminPwd").value="",document.getElementById("deleteTarget").value="",saveData(a),renderAll(),alert("已刪除："+e)):alert("找不到品名："+e)}else alert("請輸入要刪除的品名");else alert("密碼錯誤！")}function printLatestRecord(){
  var t = getData();

}function fillInColor(){var s=document.getElementById("inName");if(s.selectedIndex>0){var m=s.options[s.selectedIndex].text.match(/\(([^)]+)\)/);m&&(document.getElementById("inModel").value=m[1])}}function fillOutColor(){var s=document.getElementById("outName");if(s.selectedIndex>0){var m=s.options[s.selectedIndex].text.match(/\(([^)]+)\)/);m&&(document.getElementById("outCustomer").value=m[1])}}window.showTab=showTab;window.doIn=doIn;window.doOut=doOut;window.renderStock=renderStock;window.renderHistory=renderHistory;window.quickOut=quickOut;function restoreHistory(t){if("123"===document.getElementById("deletePwd").value.trim()){var e=getData(),n=0;for(;n<e.history.length;n++)if(e.history[n].id==t){e.history[n].deleted=!1;var a=e.history[n],o=null;for(var j=0;j<e.products.length;j++)if(e.products[j].name===a.name){o=e.products[j];break}o&&("in"===a.type?o.stock+=a.qty:o.stock-=a.qty);break}showLoading(!0);try{api("saveData",{data:JSON.stringify({products:e.products})}),api("restoreHistory",{id:t})}catch(t){console.error(t)}showLoading(!1),saveData(e),renderAll(),document.getElementById("deletePwd").value="",alert("已還原記錄")}else alert("密碼錯誤")}
